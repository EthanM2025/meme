<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Meme — UI preview (proposed quota row layout)</title>
<style>
  body {
    font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
    background: #1a1a1a;
    color: #ccc;
    margin: 0;
    padding: 24px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .frame {
    width: 466px;
    height: 466px;
    background: #000;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 6px #222, 0 0 40px rgba(0,0,0,.8);
  }
  .label {
    position: absolute;
    color: #f2eaf9;
    font-size: 14px;
    line-height: 1;
  }
  .title {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 8px;
    left: 50%;
    transform: translateX(-50%);
    top: 26px;
  }
  .title img { width: 40px; height: 40px; }
  .title span { font-size: 24px; font-weight: 600; line-height: 1; }
  .claude .title span { color: #FF6B35; }
  .codex .title span { color: #25C7FF; }

  /* arc — drawn with svg */
  .arc {
    position: absolute;
    width: 92px;
    height: 92px;
  }
  .arc .bg, .arc .fg {
    fill: none;
    stroke-width: 7;
    stroke-linecap: butt;
  }
  .arc .bg { stroke: #343246; }
  .arc-text {
    position: absolute;
    width: 92px;
    text-align: center;
    color: #f2eaf9;
    font-size: 14px;
    line-height: 1;
  }
  .arc-text.value {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  .arc-text.sub {
    font-size: 14px;
    color: #d8d0f0;
  }

  /* pet placeholder */
  .pet {
    position: absolute;
    width: 70px;
    height: 60px;
    left: 50%;
    transform: translateX(-50%);
    top: 130px;
    background: #ff8a3d;
    border-radius: 10px;
  }
  .pet:before, .pet:after {
    content: '';
    position: absolute;
    width: 8px; height: 10px;
    background: #000;
    top: 18px;
  }
  .pet:before { left: 18px; }
  .pet:after  { right: 18px; }

  /* quota row — proposed layout */
  .qrow {
    position: absolute;
    left: 64px;
    right: 64px;
    height: 30px;
  }
  .qrow .qlabel {
    position: absolute;
    left: 0;
    top: 4px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  .qrow .qbar {
    position: absolute;
    left: 48px;
    right: 90px;
    top: 12px;
    height: 10px;
    background: #303042;
    border-radius: 5px;
    overflow: hidden;
  }
  .qrow .qbar > .fill {
    height: 100%;
    border-radius: 5px;
  }
  .qrow .qpct {
    position: absolute;
    right: 0;
    top: -2px;
    font-size: 24px;
    font-weight: 600;
  }
  .qrow .qreset {
    position: absolute;
    right: 90px;
    top: -4px;
    font-size: 12px;
    color: #888;
  }
  .claude .qbar > .fill, .claude .qpct { background: transparent; }
  .claude .qbar > .fill { background: #FF6B35; }
  .claude .qpct { color: #FF6B35; }
  .codex  .qbar > .fill { background: #25C7FF; }
  .codex  .qpct { color: #25C7FF; }

  /* todolist line */
  .todolist {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    color: #F3EEF8;
    font-size: 18px;
    font-weight: 600;
  }
  .dots {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 4px;
  }
  .dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  /* summary line */
  .summary {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    color: #cccccc;
    font-size: 14px;
  }

  /* activity line (codex) */
  .activity {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    color: #cccccc;
    font-size: 14px;
  }

  /* battery */
  .battery {
    position: absolute;
    left: 0; right: 0;
    bottom: 16px;
    text-align: center;
    color: #888;
    font-size: 14px;
  }

  h2 {
    color: #eee;
    margin: 0;
    text-align: center;
    font-size: 16px;
    font-weight: 500;
  }
  figure { margin: 0; display: flex; flex-direction: column; gap: 12px; }
  .note { color: #888; font-size: 13px; text-align: center; max-width: 466px; }
</style>
</head>
